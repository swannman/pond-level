; ESP32 DOIT DevKit V1 — pond water-level node.
; Reads a DFRobot A02YYUW ultrasonic sensor (UART, 9600 8N1) facing straight
; down at a calm pond surface, median-filters the distance, converts it to a
; water level, and pushes both to Grafana Cloud via OTLP HTTP/JSON.
; Mains-powered, always-on, OTA-reflashable (sealed enclosure).

[platformio]
default_envs = esp32doit

; Shared sensor UART pins/baud + validation range, used by both the real
; firmware and the standalone sensor-test build.
[sensor]
build_flags =
    -DSENSOR_UART_NUM=2
    -DSENSOR_RX_PIN=16          ; ESP32 RX2  <- sensor TX
    -DSENSOR_TX_PIN=17          ; ESP32 TX2  -> sensor RX (unused in continuous mode)
    -DSENSOR_BAUD=9600
    -DMIN_VALID_MM=30
    -DMAX_VALID_MM=4500

; --- Real firmware: sensor + WiFi + Grafana Cloud push + OTA + watchdog ----
[env:esp32doit]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
; Build everything except the standalone test (which has its own setup/loop).
build_src_filter = +<*> -<sensor_test.cpp>
; OTA upload: uncomment and set after the first USB flash, then `pio run -t upload`
; uploads over WiFi. Password comes from secrets.h (OTA_PASSWORD).
; upload_protocol = espota
; upload_port = pond-level.local
; upload_flags = --auth=YOUR_OTA_PASSWORD

build_flags =
    ${sensor.build_flags}
    ; --- Firmware version + pull-OTA target (public GitHub repo) ---
    ; Bump FIRMWARE_VERSION to match each release tag you publish.
    -DFIRMWARE_VERSION=\"0.1.1\"
    -DOTA_GITHUB_OWNER=\"swannman\"
    -DOTA_GITHUB_REPO=\"pond-level\"
    ; Check for a new release every hour, plus once on boot (a power cycle thus
    ; forces an immediate check).
    -DOTA_CHECK_INTERVAL_MS=3600000UL
    ; --- Filtering ---
    -DMEDIAN_WINDOW=5           ; odd; 5-9 recommended
    ; --- Level calibration: distance (mm) from sensor face to the zero datum.
    ;     level_mm = SENSOR_OFFSET_MM - distance_mm. CALIBRATE against one
    ;     measured waterline before trusting level_mm.
    -DSENSOR_OFFSET_MM=1000
    ; --- Metrics push (Grafana Cloud via OTLP HTTP/JSON) ---
    -DMETRICS_PUSH_INTERVAL_MS=30000
    -DMETRICS_WIFI_CONNECT_TIMEOUT_MS=20000
    -DMETRICS_SERVICE_NAME=\"pond-level\"
    -DMETRICS_HOST_NAME=\"esp32-pond\"
    ; --- Watchdog ---
    ; 60 s: longer than the worst-case blocking push (WiFi reconnect + NTP +
    ; HTTP timeout) so a transient outage doesn't trigger a reboot loop, while
    ; still rebooting a genuine hang.
    -DWDT_TIMEOUT_MS=60000

lib_deps =
    bblanchon/ArduinoJson@^7.0.0

; --- Sensor bring-up test: live serial readout, no WiFi/Grafana -----------
; Flash with:  pio run -e sensortest -t upload   (then: pio device monitor)
[env:sensortest]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
; Build ONLY the standalone test (it has its own setup/loop).
build_src_filter = +<sensor_test.cpp>
build_flags =
    ${sensor.build_flags}
